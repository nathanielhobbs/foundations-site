{% extends "base.html" %}
{% block title %}Notebooks{% endblock %}

{% block extra_head %}
{{ super() }}
<style>
  /* Notebook cards/buttons: theme-safe fallbacks */
  .nb-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:12px;
  }
  .nb-card{
    background: var(--panel-bg, var(--bg, #fff));
    color: var(--panel-text, var(--text, #111));
    border: 1px solid var(--panel-border, rgba(0,0,0,.15));
    border-radius: 12px;
    padding: 12px;
  }
  .nb-title{ font-weight: 650; margin-bottom: .25rem; }
  .nb-muted{
    font-size: .9rem;
    margin-bottom: .6rem;
    color: var(--muted-text, rgba(127,127,127,.95));
  }
  .nb-actions{
    display:flex;
    gap:.5rem;
    flex-wrap:wrap;
  }
  .nb-btn{
    border: 1px solid var(--panel-border, rgba(0,0,0,.2));
    border-radius: 8px;
    padding: .35rem .7rem;
    text-decoration: none;
    color: inherit;
    background: transparent;
    cursor: pointer;
    user-select: none;
  }
  .nb-btn:hover{ filter: brightness(0.98); }
</style>
{% endblock %}

{% block content %}
<h2>Notebooks</h2>
<div id="nbContainer" class="nb-grid"></div>
<div id="nbEmpty" style="display:none;">No notebooks found.</div>
{% endblock %}

{% block extra_scripts %}
<script>
(async function () {
  const wrap = document.getElementById('nbContainer');
  const empty = document.getElementById('nbEmpty');

  try {
    const url = window.location.search
      ? '/api/notebooks' + window.location.search
      : '/api/notebooks';

    const res = await fetch(url);
    const data = await res.json();

    if (!data.success || !data.items || !data.items.length) {
      wrap.style.display = 'none';
      empty.textContent = (data && data.error) ? data.error : 'No notebooks found.';
      empty.style.display = 'block';
      return;
    }

    const items = [...data.items].sort((a, b) => {
      const da = a.date ? new Date(a.date).getTime() : 0;
      const db = b.date ? new Date(b.date).getTime() : 0;
      return db - da; // newest first
    });

    wrap.innerHTML = '';

    for (const it of items) {
      const ext = (it.ext || '').toLowerCase();
      const filename = (it.filename || '').toLowerCase();
      const isIpynb = (ext === '.ipynb') || filename.endsWith('.ipynb');

      const card = document.createElement('div');
      card.className = 'nb-card';

      const title = document.createElement('div');
      title.className = 'nb-title';
      title.textContent = it.title || it.filename || 'Untitled';

      const meta = document.createElement('div');
      meta.className = 'nb-muted';
      meta.textContent = 'Updated: ' + (it.date ? new Date(it.date).toLocaleString() : '—');

      const actions = document.createElement('div');
      actions.className = 'nb-actions';

      // Only show Colab for .ipynb
      if (isIpynb) {
        const aColab = document.createElement('a');
        aColab.className = 'nb-btn';
        aColab.href = `https://colab.research.google.com/github/${it.github_path}`;
        aColab.target = '_blank';
        aColab.rel = 'noopener';
        aColab.textContent = 'Open in Colab';
        actions.appendChild(aColab);
      }

      const aGit = document.createElement('a');
      aGit.className = 'nb-btn';
      aGit.href = `https://github.com/${it.github_path}`;
      aGit.target = '_blank';
      aGit.rel = 'noopener';
      aGit.textContent = 'View on GitHub';
      actions.appendChild(aGit);

      const aDl = document.createElement('a');
      aDl.className = 'nb-btn nb-dl';
      aDl.href = '#';
      aDl.setAttribute('data-url', it.download_url);
      aDl.setAttribute('data-name', it.filename);
      aDl.textContent = (it.ext && it.ext.toLowerCase() === '.ipynb') ? 'Download .ipynb' : 'Download';
      actions.appendChild(aDl);

      card.appendChild(title);
      card.appendChild(meta);
      card.appendChild(actions);
      wrap.appendChild(card);
    }
  } catch (err) {
    console.error('Error loading notebooks', err);
    wrap.style.display = 'none';
    empty.textContent = 'Error loading notebooks.';
    empty.style.display = 'block';
  }
})();
</script>

<script>
function nbSafeName(s) {
  return (s || 'notebook').replace(/[^A-Za-z0-9._-]+/g, '_');
}

async function downloadFile(url, filename) {
  const res = await fetch(url, { credentials: 'omit' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const blob = await res.blob();

  const disp = res.headers.get('Content-Disposition') || '';
  const m = /filename\*?=(?:UTF-8'')?["']?([^"';\n]+)["']?/i.exec(disp);
  const name = m ? decodeURIComponent(m[1]) : filename;

  const a = document.createElement('a');
  const objectUrl = URL.createObjectURL(blob);
  a.href = objectUrl;
  a.download = name || nbSafeName('download');
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(objectUrl);
}

document.addEventListener('click', async (e) => {
  const a = e.target.closest('a.nb-dl');
  if (!a) return;
  e.preventDefault();
  const url = a.getAttribute('data-url');
  const name = a.getAttribute('data-name') || 'download';
  try {
    await downloadFile(url, name);
  } catch (err) {
    console.warn('Blob download failed, falling back:', err);
    window.location.href = url;
  }
});
</script>
{% endblock %}
